events {
    worker_processes auto;
}

http {
    # El backend gestiona la API
    server {
        listen 80;

        # Frontend React
        location / {
            proxy_pass http://frontend:3000;
        }

        # API del backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        # Microservicios dinámicos - incluye configs generadas
        include /etc/nginx/conf.d/*.conf;
    }
}