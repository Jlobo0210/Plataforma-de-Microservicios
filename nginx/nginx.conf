events {
    # ⭐ Aumentar conexiones por worker
    worker_connections 4096;
    # ⭐ Permite que un worker acepte múltiples conexiones a la vez
    multi_accept on;
}

http {
    # ⭐ Mantener conexiones vivas para reutilizarlas
    keepalive_timeout 65;
    keepalive_requests 100;

    # ⭐ Optimizar timeouts para liberar conexiones inactivas
    proxy_connect_timeout 10s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;

    # ⭐ Evitar que NGINX acumule conexiones al upstream
    proxy_http_version 1.1;
    proxy_set_header Connection "";


    server {
        listen 80;

        # Frontend React (comentado hasta que esté listo)
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # ⭐ Necesario para hot reload de React (WebSocket)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # API del backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ⭐ Locations dinámicas DENTRO del server block
        include /etc/nginx/locations/*.conf;
    }
}